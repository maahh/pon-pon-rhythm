<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ぽんぽんリズム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Claude Codeのカニ🦀とリズムであそぼう。3歳からのリズムタップゲーム。">
  <meta name="theme-color" content="#1a1a2e">
  <!-- iOS ホーム画面追加（全画面PWA） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ぽんぽん">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- スタート画面 -->
    <section id="start-screen" class="screen">
      <div class="title-crab">🦀</div>
      <h1 class="title">ぽんぽんリズム</h1>
      <button id="start-btn" class="start-btn" aria-label="スタート">▶</button>
      <p class="hint">カニさんが ぴょこんと したら タップ！</p>
    </section>

    <!-- ゲーム画面 -->
    <section id="game-screen" class="screen hidden">
      <div id="stars" class="stars" aria-hidden="true"></div>
      <div id="stage" class="stage">
        <div id="ring" class="ring"></div>
        <div id="crab" class="crab">🦀</div>
      </div>
      <div id="fx" class="fx" aria-hidden="true"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
